{% extends 'timetable/base.html' %}

{% block content %}

<h2>Ajouter / Modifier un cours</h2>

<form method="post">

    {% csrf_token %}

    {{ form.as_p }}

    <button class="btn btn-primary">
        Enregistrer
    </button>

    <a href="{% url 'timetable:timetable_list' %}"
       class="btn btn-secondary">
        Retour
    </a>

</form>

{% endblock %}
