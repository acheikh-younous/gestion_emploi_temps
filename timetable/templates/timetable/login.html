{% extends 'timetable/base.html' %}

{% block content %}

<div class="row justify-content-center">

    <div class="col-md-4">

        <div class="card">

            <div class="card-header">
                Connexion
            </div>

            <div class="card-body">

                <form method="post">

                    {% csrf_token %}

                    {{ form.as_p }}

                    <button class="btn btn-primary w-100">
                        Se connecter
                    </button>

                </form>

            </div>

        </div>

    </div>

</div>

{% endblock %}
